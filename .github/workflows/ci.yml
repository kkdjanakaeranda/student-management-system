name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    name: PHP Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    strategy:
      matrix:
        php-version: ['7.4', '8.0', '8.1']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_mysql, mbstring, gd
        coverage: xdebug
    
    - name: Validate composer.json
      run: composer validate --strict
    
    - name: Cache Composer packages
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-
    
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    
    - name: Run PHPUnit tests
      run: |
        if [ -f phpunit.xml ]; then
          vendor/bin/phpunit --coverage-text
        else
          echo "No tests configured yet"
        fi
  
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: pdo, pdo_mysql, mbstring
    
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    
    - name: Run PHP CodeSniffer
      run: |
        if [ -d src ]; then
          vendor/bin/phpcs --standard=PSR12 src/ || true
        else
          echo "No src directory for code standards check"
        fi
    
    - name: Check PHP syntax
      run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check for secrets in code
      run: |
        echo "Checking for potential secrets..."
        ! grep -r -i "password.*=.*['\"].*['\"]" --include="*.php" --exclude-dir=vendor . || echo "Warning: Found hardcoded passwords"
        ! grep -r -i "api_key.*=.*['\"].*['\"]" --include="*.php" --exclude-dir=vendor . || echo "Warning: Found hardcoded API keys"
    
    - name: Verify .env.example exists
      run: |
        if [ ! -f .env.example ]; then
          echo "Error: .env.example file is missing"
          exit 1
        fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: docker build -t student-management-system:latest .
    
    - name: Test Docker Compose
      run: |
        docker-compose config
        echo "Docker Compose configuration is valid"

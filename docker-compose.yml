version: '3.8'

services:
  # PHP Apache Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/www/html/logs
    environment:
      - DB_HOST=db
      - DB_NAME=student_management_system
      - DB_USER=root
      - DB_PASS=rootpassword
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080/
    depends_on:
      - db
    networks:
      - sms-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: sms-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_management_system
      MYSQL_USER: sms_user
      MYSQL_PASSWORD: sms_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - sms-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sms-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
    networks:
      - sms-network

networks:
  sms-network:
    driver: bridge

volumes:
  db_data:
